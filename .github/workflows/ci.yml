name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t agent-os-api:test ./apps/api

      - name: Build worker image
        run: docker build -t agent-os-worker:test ./apps/api -f ./apps/api/Dockerfile.worker

      - name: Build LLM router image
        run: docker build -t agent-os-llm-router:test ./apps/llm-router

      - name: Build runtime image
        run: docker build -t agent-os-runtime:test ./apps/runtime

  e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, docker-build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d redis neo4j ollama llm-router api worker runtime

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: |
          cd tests/e2e
          pnpm install
          pnpm test
