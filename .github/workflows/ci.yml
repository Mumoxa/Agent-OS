name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  app-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build packages
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t agent-os-api:test -f apps/api/Dockerfile .

      - name: Build worker image
        run: docker build -t agent-os-worker:test -f apps/api/Dockerfile.worker .

      - name: Build LLM router image
        run: docker build -t agent-os-llm-router:test -f apps/llm-router/Dockerfile .

      - name: Build runtime image
        run: docker build -t agent-os-runtime:test -f apps/runtime/Dockerfile .

  e2e:
    runs-on: ubuntu-latest
    needs: [app-checks, docker-build]
    # `env` is not available in a job-level `if`, so gate on a repository
    # variable instead. Set repo variable E2E_ENABLED=true to opt in;
    # when unset the expression is empty and the job is skipped.
    if: vars.E2E_ENABLED == 'true'
    env:
      E2E_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d redis neo4j ollama llm-router api worker runtime

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm test --workspace @agent-os/e2e-tests
