name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  E2E_ENABLED: 'false'

jobs:
  app-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      # TODO: Replace this with a blocking lint step after a TypeScript ESLint config is added.
      - name: Lint (non-blocking until ESLint is configured)
        continue-on-error: true
        run: npm run lint --if-present

      - name: Build packages
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t agent-os-api:test ./apps/api

      - name: Build worker image
        run: docker build -t agent-os-worker:test ./apps/api -f ./apps/api/Dockerfile.worker

      - name: Build LLM router image
        run: docker build -t agent-os-llm-router:test ./apps/llm-router

      - name: Build runtime image
        run: docker build -t agent-os-runtime:test ./apps/runtime

  e2e:
    runs-on: ubuntu-latest
    needs: [app-checks, docker-build]
    if: env.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d redis neo4j ollama llm-router api worker runtime

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm test --workspace @agent-os/e2e-tests
